name: Auto Review Bot Trigger with Blockchain Forensics

on:
  pull_request_target:
  pull_request_review:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull Request Number
        type: string
        required: true
  issue_comment:
    types:
      - created

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    name: Trigger
    steps:
      - name: Write PR Number - PR Target
        run: echo $PR_NUMBER > pr-number.txt
        if: github.event_name == 'pull_request_target' && ((!endsWith(github.event.sender.login, '-bot') && !endsWith(github.event.sender.login, '[bot]')) || github.event.sender.login == 'renovate[bot]')
        env:
          PR_NUMBER: ${{ github.event.number }}

      - name: Write PR Number - PR Review
        run: echo $PR_NUMBER > pr-number.txt
        if: github.event_name == 'pull_request_review' && !endsWith(github.event.sender.login, '-bot') && !endsWith(github.event.sender.login, '[bot]')
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Write PR Number - Workflow Dispatch
        run: echo $PR_NUMBER > pr-number.txt
        if: github.event_name == 'workflow_dispatch'
        env:
          PR_NUMBER: ${{ inputs.pr_number }}

      - name: Write PR Number - Comment Retrigger
        run: echo $PR_NUMBER > pr-number.txt
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@eth-bot rerun')
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
      
      - name: Check File Existence
        uses: andstor/file-existence-action@20b4d2e596410855db8f9ca21e96fbe18e12930b
        id: check_pr_number_exists
        with:
          files: pr-number.txt

      - name: Save PR Number
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: steps.check_pr_number_exists.outputs.files_exists == 'true'
        with:
          name: pr-number
          path: pr-number.txt

  blockchain-forensics:
    name: Blockchain Forensics Scan
    runs-on: ubuntu-latest
    needs: trigger
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Validate secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ETHERSCAN_API_KEY }}" ]; then
            echo "❌ Error: ETHERSCAN_API_KEY is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.ARBISCAN_API_KEY }}" ]; then
            echo "❌ Error: ARBISCAN_API_KEY is not configured"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Download PR number artifact
        uses: actions/download-artifact@v3
        with:
          name: pr-number

      - name: Extract PR number
        id: pr_info
        run: |
          PR_NUMBER=$(cat pr-number.txt)
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "PR Number: $PR_NUMBER"

      - name: Run Forensic Scan
        id: scan
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          GITHUB_ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python forensics.py 2>&1 | tee scan_output.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: forensic-scan-results-pr${{ steps.pr_info.outputs.pr_number }}-${{ github.run_id }}
          path: |
            scan_output.log
            results/
            forensics.log
          retention-days: 30

      - name: Comment PR with Scan Results
        if: always() && steps.pr_info.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🔍 Blockchain Forensic Scan Results\n\n';
            
            if (fs.existsSync('scan_output.log')) {
              const log = fs.readFileSync('scan_output.log', 'utf8');
              const lastLines = log.split('\n').slice(-20).join('\n');
              summary += '```\n' + lastLines + '\n```\n';
            } else {
              summary += 'No scan results available.\n';
            }
            
            summary += `\n[View full results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr_info.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Notify on Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            core.notice('✅ Blockchain forensic scan completed successfully!');

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('❌ Blockchain forensic scan failed. Check logs for details.');
            
            if (require('fs').existsSync('scan_output.log')) {
              const log = require('fs').readFileSync('scan_output.log', 'utf8');
              const lastLines = log.split('\n').slice(-30).join('\n');
              core.error(`Last output:\n${lastLines}`);
            }

      - name: Send Discord Notification (Optional)
        if: always() && secrets.DISCORD_WEBHOOK_URL != ''
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          PR_NUMBER="${{ steps.pr_info.outputs.pr_number }}"
          
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"embeds\": [{
                \"title\": \"$EMOJI Blockchain Forensic Scan - PR #$PR_NUMBER\",
                \"description\": \"Status: **$STATUS**\",
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"color\": $([ \"$STATUS\" = \"success\" ] && echo \"65280\" || echo \"16711680\"),
                \"fields\": [
                  {\"name\": \"PR Number\", \"value\": \"$PR_NUMBER\", \"inline\": true},
                  {\"name\": \"Run ID\", \"value\": \"${{ github.run_id }}\", \"inline\": true},
                  {\"name\": \"Actor\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Event\", \"value\": \"${{ github.event_name }}\", \"inline\": true}
                ]
              }]
            }"

      - name: Send Telegram Notification (Optional)
        if: failure() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.pr_number }}"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ Blockchain Forensic Scan FAILED for PR #$PR_NUMBER%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
