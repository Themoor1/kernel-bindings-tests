name: Run Blockchain Forensic Scan

on:
  schedule:
    - cron: '0 * * * *' # Triggers automatically every hour
  workflow_dispatch: # Manual trigger via GitHub UI
    inputs:
      force_full_scan:
        description: 'Run full scan (not incremental)'
        required: false
        type: boolean
        default: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Validate secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ETHERSCAN_API_KEY }}" ]; then
            echo "❌ Error: ETHERSCAN_API_KEY is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.ARBISCAN_API_KEY }}" ]; then
            echo "❌ Error: ARBISCAN_API_KEY is not configured"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Run Forensic Scan
        id: scan
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
          FORCE_FULL_SCAN: ${{ github.event.inputs.force_full_scan || false }}
          GITHUB_ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python forensics.py 2>&1 | tee scan_output.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: forensic-scan-results-${{ github.run_id }}
          path: |
            scan_output.log
            results/
            logs/
          retention-days: 30

      - name: Comment on PR (if triggered from PR)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('scan_output.log', 'utf8');
            const summary = log.split('\n').slice(-20).join('\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Blockchain Forensic Scan Results\n\n\`\`\`\n${summary}\n\`\`\`\n\n[View full results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });

      - name: Notify on Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            core.notice('✅ Blockchain forensic scan completed successfully!');

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('❌ Blockchain forensic scan failed. Check logs for details.');
            
            const fs = require('fs');
            if (fs.existsSync('scan_output.log')) {
              const log = fs.readFileSync('scan_output.log', 'utf8');
              const lastLines = log.split('\n').slice(-30).join('\n');
              core.error(`Last output:\n${lastLines}`);
            }

      - name: Send Discord Notification (Optional)
        if: always() && secrets.DISCORD_WEBHOOK_URL != ''
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"embeds\": [{
                \"title\": \"$EMOJI Blockchain Forensic Scan\",
                \"description\": \"Status: **$STATUS**\",
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"color\": $([ "$STATUS" = "success" ] && echo "65280" || echo "16711680"),
                \"fields\": [
                  {\"name\": \"Run ID\", \"value\": \"${{ github.run_id }}\", \"inline\": true},
                  {\"name\": \"Trigger\", \"value\": \"${{ github.event_name }}\", \"inline\": true}
                ]
              }]
            }"

      - name: Send Telegram Notification (Optional)
        if: failure() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ Blockchain Forensic Scan FAILED%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
